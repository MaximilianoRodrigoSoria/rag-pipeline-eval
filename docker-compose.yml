# Servicios de apoyo para desarrollo y pruebas del RAG.
#   Todo:      docker compose up -d
#   Solo uno:  docker compose up -d qdrant
services:
  # Vector store alternativo a Chroma (el README contempla migrar a Qdrant).
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST / dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # LLM local para el proveedor "ollama" (LLM_PROVIDER=ollama en el .env).
  # Para usar la GPU (RTX 3070), descomentá el bloque 'deploy' y tené el
  # NVIDIA Container Toolkit instalado. Luego: docker exec -it <c> ollama pull llama3.1:8b
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  qdrant_data:
  ollama_data:
