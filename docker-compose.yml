# Servicios de apoyo para desarrollo/pruebas del RAG.
#   Levantar Ollama:      docker compose up -d ollama
#   Bajar el modelo:      docker compose --profile pull up ollama-pull
#   (opcional) Qdrant:    docker compose up -d qdrant
#
# El RAG lo usa vía OLLAMA_BASE_URL=http://localhost:11434 (default del .env).
# Ojo: no corras además el Ollama nativo, chocarían en el puerto 11434.

services:
  # LLM local. Descomentá el bloque 'deploy' para usar la GPU (RTX 3070);
  # requiere Docker Desktop con soporte GPU (WSL2 + NVIDIA). Sin eso, corre en CPU.
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # Baja el modelo DENTRO del contenedor de Ollama. Uso puntual:
  #   docker compose --profile pull up ollama-pull
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
    entrypoint: ["/bin/sh", "-c", "sleep 3; ollama pull \"$${OLLAMA_MODEL}\""]
    restart: "no"
    profiles: ["pull"]

  # Vector store alternativo a Chroma (opcional; el README contempla Qdrant).
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    profiles: ["qdrant"]

volumes:
  ollama_data:
  qdrant_data:
